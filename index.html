<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>よりみちクエスト</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { height: 100%; }
  body {
    font-family: "Hiragino Maru Gothic ProN", "ヒラギノ丸ゴ ProN", "BIZ UDGothic", "Yu Gothic", sans-serif;
    background: #f7f1e3;
    color: #4a3f35;
    min-height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  #app { width: 100%; max-width: 480px; padding: 16px 16px 96px; }

  header { text-align: center; padding: 8px 0 4px; }
  header h1 { font-size: 22px; letter-spacing: 2px; }
  header .copy { font-size: 11px; color: #a4917a; margin-top: 2px; letter-spacing: 1px; }

  .homebar {
    display: flex; justify-content: center; margin: 12px 0 4px;
  }
  .hometoggle {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 13px; color: #7a6a58;
    background: #efe6d2; border: 1.5px solid #ddcfb4; border-radius: 999px;
    padding: 6px 14px; cursor: pointer; user-select: none;
    transition: background .2s, color .2s;
  }
  .hometoggle input { display: none; }
  .hometoggle.on { background: #4a3f35; color: #f7f1e3; border-color: #4a3f35; }

  .stage { display: flex; flex-direction: column; gap: 12px; margin-top: 16px; perspective: 800px; }
  .hint { text-align: center; font-size: 11px; color: #b3a184; letter-spacing: 1px; }

  .card {
    background: #fffdf7;
    border: 1.5px solid #e3d7bd;
    border-radius: 18px;
    padding: 24px 20px 20px;
    box-shadow: 0 4px 0 #e3d7bd;
    position: relative;
    transform-style: preserve-3d;
    touch-action: pan-y;
    user-select: none;
    -webkit-user-select: none;
  }
  .card.flip { animation: flip .38s ease; }
  @keyframes flip {
    0% { transform: rotateY(0); }
    50% { transform: rotateY(90deg); }
    100% { transform: rotateY(0); }
  }

  .chiprow { display: flex; justify-content: space-between; align-items: center; }
  .chip {
    display: inline-block; font-size: 11px; padding: 3px 10px; border-radius: 999px;
    color: #fff; letter-spacing: 1px;
  }
  .place { font-size: 11px; color: #b3a184; }

  .qtext { font-size: 22px; line-height: 1.7; margin: 20px 2px 24px; min-height: 4.2em; font-weight: bold; }

  .actions { display: flex; gap: 10px; }
  .btn-skip, .btn-done {
    border: none; border-radius: 12px; font-family: inherit; font-size: 14px;
    padding: 15px 0; cursor: pointer; font-weight: bold;
  }
  .btn-skip {
    flex: 1; background: #efe6d2; color: #8a7a64; box-shadow: 0 2px 0 #ddcfb4;
  }
  .btn-done {
    flex: 1.6; background: #e8703a; color: #fff; box-shadow: 0 2px 0 #c05a2b; letter-spacing: 2px;
  }
  .btn-skip:active, .btn-done:active { transform: translateY(2px); box-shadow: none; }

  /* emoji burst */
  .burst { position: absolute; left: 50%; top: 40%; pointer-events: none; z-index: 5; }
  .burst span {
    position: absolute; font-size: 22px; animation: pop .8s ease-out forwards;
  }
  @keyframes pop {
    0% { transform: translate(0,0) scale(.4); opacity: 1; }
    100% { transform: translate(var(--dx), var(--dy)) scale(1.2); opacity: 0; }
  }

  /* album */
  .album-head { text-align: center; margin: 16px 0 4px; font-size: 14px; color: #8a7a64; }
  .album-head b { font-size: 22px; color: #4a3f35; }
  .datelabel { font-size: 12px; color: #b3a184; margin: 18px 4px 6px; letter-spacing: 1px; }
  .entry {
    background: #fffdf7; border: 1.5px solid #e3d7bd; border-radius: 14px;
    padding: 12px 14px; margin-bottom: 10px;
  }
  .entry .etext { font-size: 14px; line-height: 1.5; }
  .entry img { width: 100%; border-radius: 10px; margin-top: 10px; display: block; }
  .empty { text-align: center; color: #b3a184; font-size: 13px; margin-top: 48px; line-height: 2; }

  /* tabs */
  nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    display: flex; justify-content: center; gap: 0;
    background: #fffdf7; border-top: 1.5px solid #e3d7bd;
    padding: 6px 0 calc(8px + env(safe-area-inset-bottom));
  }
  nav button {
    flex: 1; max-width: 240px; background: none; border: none; font-family: inherit;
    font-size: 13px; color: #b3a184; padding: 8px 0; cursor: pointer; font-weight: bold;
  }
  nav button.active { color: #e8703a; }
  nav button .ico { display: block; font-size: 20px; }

  /* modal */
  #modal {
    position: fixed; inset: 0; background: rgba(74,63,53,.45);
    display: flex; align-items: center; justify-content: center; z-index: 10; padding: 24px;
  }
  #modal[hidden] { display: none; }
  .mbox {
    background: #fffdf7; border-radius: 20px; padding: 24px 20px; width: 100%; max-width: 360px;
    text-align: center; animation: rise .25s ease;
  }
  @keyframes rise { from { transform: translateY(20px); opacity: 0; } to { transform: none; opacity: 1; } }
  .mbox .stamp {
    display: inline-block; font-size: 18px; font-weight: bold; color: #e8703a;
    border: 3px solid #e8703a; border-radius: 10px; padding: 4px 14px;
    transform: rotate(-6deg); margin-bottom: 12px; letter-spacing: 2px;
  }
  .mbox .mq { font-size: 14px; color: #8a7a64; line-height: 1.6; margin-bottom: 18px; }
  .mbox button {
    display: block; width: 100%; border: none; border-radius: 12px; font-family: inherit;
    font-size: 15px; font-weight: bold; padding: 13px 0; cursor: pointer; margin-top: 10px;
  }
  .m-photo { background: #4a3f35; color: #f7f1e3; box-shadow: 0 2px 0 #2e261e; }
  .m-plain { background: #efe6d2; color: #8a7a64; box-shadow: 0 2px 0 #ddcfb4; }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>よりみちクエスト</h1>
    <p class="copy">— 人生に、意味のない用事を。 —</p>
  </header>

  <section id="view-today">
    <div class="homebar">
      <label class="hometoggle" id="hometoggle">
        <input type="checkbox" id="homecheck">
        <span id="homelabel">🏠 きょうは おうちで</span>
      </label>
    </div>
    <div class="stage">
      <div class="card" id="card"></div>
      <p class="hint">← よこに スワイプしても べつのクエスト →</p>
    </div>
  </section>

  <section id="view-album" hidden>
    <div class="album-head">つうさん <b id="totalcount">0</b> クエスト</div>
    <div id="albumlist"></div>
  </section>

  <nav>
    <button id="tab-today" class="active"><span class="ico">📜</span>きょうのクエスト</button>
    <button id="tab-album"><span class="ico">📖</span>おもいでアルバム</button>
  </nav>
</div>

<div id="modal" hidden>
  <div class="mbox">
    <div class="stamp">クエストクリア！</div>
    <p class="mq" id="modal-q"></p>
    <button class="m-photo" id="m-photo">📷 しゃしんを のこす</button>
    <button class="m-plain" id="m-plain">そのまま完了</button>
  </div>
</div>
<input type="file" accept="image/*" id="fileinput" hidden>

<script>
// ---- クエストプール（文体ガイド: CLAUDE.md 参照） ----
// place: 'いえ' | 'そと' | 'どこでも'
const CATS = {
  hirou:    { name: 'ひろう',    emoji: '🪨', color: '#7a9e7e' },
  tsukuru:  { name: 'つくる',    emoji: '✂️', color: '#d98e5f' },
  totonoe:  { name: 'ととのえる', emoji: '🧺', color: '#8ba3c7' },
  kaku:     { name: 'かく',      emoji: '🖍️', color: '#c77f9e' },
  miru:     { name: 'みる・きく', emoji: '👀', color: '#a08cc0' },
  tanken:   { name: 'たんけん',  emoji: '🧭', color: '#5f9ea0' },
  yattemiru:{ name: 'やってみる', emoji: '🎲', color: '#c7a24b' },
};
const QUESTS = [
  { id: 1,  cat: 'hirou',    place: 'そと',    text: 'すべすべの石をひとつ拾う' },
  { id: 2,  cat: 'hirou',    place: 'そと',    text: 'きれいな落ち葉を1枚拾って、本にはさむ' },
  { id: 3,  cat: 'hirou',    place: 'そと',    text: '落ちているゴミをひとつ拾って、捨てる' },
  { id: 4,  cat: 'hirou',    place: 'そと',    text: 'できるだけまっすぐな枝を探す' },
  { id: 5,  cat: 'tsukuru',  place: 'いえ',    text: 'ダンボールを丸く切る' },
  { id: 6,  cat: 'tsukuru',  place: 'いえ',    text: '紙飛行機を折って、部屋の端から端まで飛ばす' },
  { id: 7,  cat: 'tsukuru',  place: 'いえ',    text: 'アルミホイルで、できるだけまんまるの球を作る' },
  { id: 8,  cat: 'tsukuru',  place: 'いえ',    text: '輪ゴム3本で何かを発明する' },
  { id: 9,  cat: 'totonoe',  place: 'いえ',    text: 'いらないものをひとつ捨てる' },
  { id: 10, cat: 'totonoe',  place: 'どこでも', text: '財布からレシートを全部出す' },
  { id: 11, cat: 'totonoe',  place: 'どこでも', text: 'スマホの写真を、いらないもの1枚だけ消す' },
  { id: 12, cat: 'totonoe',  place: 'いえ',    text: '机の上のものをひとつ、家の中の正しい場所に帰す' },
  { id: 13, cat: 'totonoe',  place: 'いえ',    text: '手持ちのペンが全部書けるか試して、書けないやつを捨てる' },
  { id: 14, cat: 'kaku',     place: 'どこでも', text: '猫の絵を描く' },
  { id: 15, cat: 'kaku',     place: 'どこでも', text: '利き手じゃないほうの手で自分の名前を書く' },
  { id: 16, cat: 'kaku',     place: 'どこでも', text: '目をつぶって象の絵を描く' },
  { id: 17, cat: 'kaku',     place: 'どこでも', text: 'いまの気持ちを五七五で詠む' },
  { id: 18, cat: 'miru',     place: 'どこでも', text: '空を1分間見上げる' },
  { id: 19, cat: 'miru',     place: 'どこでも', text: 'いちばん遠くから聞こえる音をつきとめる' },
  { id: 20, cat: 'miru',     place: 'どこでも', text: '雲をひとつ選んで、名前をつける' },
  { id: 21, cat: 'miru',     place: 'どこでも', text: '自分の手のひらのしわを30秒観察する' },
  { id: 22, cat: 'miru',     place: 'どこでも', text: '今日の空の色に、いちばん近い色の名前をつける' },
  { id: 23, cat: 'miru',     place: 'いえ',    text: '窓から見えるものをひとつ、声に出して実況する' },
  { id: 24, cat: 'tanken',   place: 'そと',    text: '知らない道を1本だけ曲がってみる' },
  { id: 25, cat: 'tanken',   place: 'そと',    text: '硬貨を投げて、表なら右、裏なら左に10歩歩く' },
  { id: 26, cat: 'tanken',   place: 'そと',    text: '今日の空を写真に1枚撮る' },
  { id: 27, cat: 'yattemiru', place: 'いえ',    text: '飲み物をいつもと違うコップで飲む' },
  { id: 28, cat: 'yattemiru', place: 'どこでも', text: '目をつぶって一口食べて、味を言葉にする' },
  { id: 29, cat: 'yattemiru', place: 'いえ',    text: '家の中をいつもと逆回りで一周する' },
  { id: 30, cat: 'yattemiru', place: 'いえ',    text: '家の中で、座ったことのない場所に座ってみる' },
  { id: 31, cat: 'yattemiru', place: 'いえ',    text: '家にあるいちばん小さいものを探す' },
  { id: 32, cat: 'yattemiru', place: 'いえ',    text: '本を1冊選んで、適当に開いたページだけ読む' },
  { id: 33, cat: 'yattemiru', place: 'いえ',    text: '5年以上使っているものをひとつ見つけて、ねぎらう' },
  { id: 34, cat: 'yattemiru', place: 'どこでも', text: 'ポケットかかばんの中身を全部出して、並べる' },
  { id: 35, cat: 'yattemiru', place: 'どこでも', text: 'その場で10秒だけ、全力で変なダンスをする' },
  { id: 36, cat: 'yattemiru', place: 'いえ',    text: '靴下を左右わざと違うものにして過ごす' },
];

// ---- 状態 ----
const KEY = 'yorimichi_v1';
const todayStr = () => {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
};

function hashSeed(str) {
  let h = 1779033703;
  for (let i = 0; i < str.length; i++) {
    h = Math.imul(h ^ str.charCodeAt(i), 3432918353);
    h = (h << 13) | (h >>> 19);
  }
  return h >>> 0;
}
function mulberry32(a) {
  return function() {
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
function dailyOrder(day) {
  const rand = mulberry32(hashSeed(day));
  const ids = QUESTS.map(q => q.id);
  for (let i = ids.length - 1; i > 0; i--) {
    const j = Math.floor(rand() * (i + 1));
    [ids[i], ids[j]] = [ids[j], ids[i]];
  }
  return ids;
}

let S = load();
function load() {
  let s = null;
  try { s = JSON.parse(localStorage.getItem(KEY)); } catch (e) {}
  if (!s) s = { day: '', order: [], slot: null, skipped: [], doneToday: [], homeMode: false, log: [] };
  if (Array.isArray(s.slots)) { s.slot = s.slots[0] ?? null; delete s.slots; }  // 旧3枠形式からの移行
  if (s.day !== todayStr()) {
    s.day = todayStr();
    s.order = dailyOrder(s.day);
    s.skipped = [];
    s.doneToday = [];
    s.slot = null;
    s.slot = draw(s);
  }
  return s;
}
function save() {
  try { localStorage.setItem(KEY, JSON.stringify(S)); }
  catch (e) { alert('保存にしっぱいしました（容量オーバーかも）'); }
}
function byId(id) { return QUESTS.find(q => q.id === id); }

// デッキから次の1枚を引く。除外が厳しくて引けなければ段階的にゆるめる
function draw(s) {
  const fits = q => !s.homeMode || q.place !== 'そと';
  const isCurrent = id => id === s.slot;
  const tiers = [
    id => fits(byId(id)) && !isCurrent(id) && !s.skipped.includes(id) && !s.doneToday.includes(id),
    id => fits(byId(id)) && !isCurrent(id) && !s.doneToday.includes(id),  // スキップ札を再利用
    id => fits(byId(id)) && !isCurrent(id),                               // 完了済みも再利用
  ];
  for (const ok of tiers) {
    const found = s.order.find(ok);
    if (found !== undefined) return found;
  }
  return s.order.find(id => !isCurrent(id)) ?? s.order[0];
}

// ---- 描画 ----
const $ = sel => document.querySelector(sel);
const cardEl = $('#card');

function cardHTML(q) {
  const c = CATS[q.cat];
  return `
    <div class="chiprow">
      <span class="chip" style="background:${c.color}">${c.emoji} ${c.name}</span>
      <span class="place">ばしょ: ${q.place}</span>
    </div>
    <p class="qtext">${q.text}</p>
    <div class="actions">
      <button class="btn-skip">🔄 べつのにする</button>
      <button class="btn-done">やった！</button>
    </div>`;
}

function renderCard() {
  cardEl.innerHTML = cardHTML(byId(S.slot));
}

function flipTo(newId) {
  cardEl.classList.add('flip');
  setTimeout(() => { cardEl.innerHTML = cardHTML(byId(newId)); }, 190);
  setTimeout(() => { cardEl.classList.remove('flip'); }, 400);
}

// リロール: 横にすべり出て、次のカードが反対側から入ってくる
let animating = false;
function reroll(dir) {
  if (animating) return;
  animating = true;
  S.skipped.push(S.slot);              // 同日中は再登場しない
  S.slot = draw(S);
  save();
  cardEl.style.transition = 'transform .2s ease-in, opacity .2s';
  cardEl.style.transform = `translateX(${dir * 120}%) rotate(${dir * 8}deg)`;
  cardEl.style.opacity = '0';
  setTimeout(() => {
    renderCard();
    cardEl.style.transition = 'none';
    cardEl.style.transform = `translateX(${-dir * 60}%) rotate(${-dir * 4}deg)`;
    requestAnimationFrame(() => requestAnimationFrame(() => {
      cardEl.style.transition = 'transform .22s ease-out, opacity .22s';
      cardEl.style.transform = '';
      cardEl.style.opacity = '1';
      setTimeout(() => { animating = false; }, 240);
    }));
  }, 210);
}

function burst() {
  const b = document.createElement('div');
  b.className = 'burst';
  const emojis = ['🎉', '✨', '⭐', '🎊', '✨', '🌟'];
  emojis.forEach((e, i) => {
    const sp = document.createElement('span');
    sp.textContent = e;
    const ang = (i / emojis.length) * Math.PI * 2;
    sp.style.setProperty('--dx', `${Math.cos(ang) * 70}px`);
    sp.style.setProperty('--dy', `${Math.sin(ang) * 55 - 30}px`);
    b.appendChild(sp);
  });
  cardEl.appendChild(b);
  setTimeout(() => b.remove(), 900);
}

// ---- 操作 ----
cardEl.addEventListener('click', e => {
  if (e.target.closest('.btn-skip')) {
    reroll(-1);
  } else if (e.target.closest('.btn-done')) {
    openModal();
  }
});

// スワイプでリロール
let dragStartX = null, dragX = 0;
cardEl.addEventListener('pointerdown', e => {
  if (animating || e.target.closest('button')) return;
  dragStartX = e.clientX;
  dragX = 0;
  cardEl.setPointerCapture(e.pointerId);
  cardEl.style.transition = 'none';
});
cardEl.addEventListener('pointermove', e => {
  if (dragStartX === null) return;
  dragX = e.clientX - dragStartX;
  cardEl.style.transform = `translateX(${dragX}px) rotate(${dragX / 30}deg)`;
});
function dragEnd() {
  if (dragStartX === null) return;
  dragStartX = null;
  if (Math.abs(dragX) > 70) {
    reroll(Math.sign(dragX));
  } else {
    cardEl.style.transition = 'transform .18s ease-out';
    cardEl.style.transform = '';
  }
  dragX = 0;
}
cardEl.addEventListener('pointerup', dragEnd);
cardEl.addEventListener('pointercancel', dragEnd);

// 完了モーダル
let pending = false;
function openModal() {
  pending = true;
  $('#modal-q').textContent = byId(S.slot).text;
  $('#modal').hidden = false;
}
function completeQuest(photo) {
  pending = false;
  $('#modal').hidden = true;
  const id = S.slot;
  const entry = { id, ts: Date.now() };
  if (photo) entry.photo = photo;
  S.log.push(entry);
  S.doneToday.push(id);
  S.slot = draw(S);
  try {
    localStorage.setItem(KEY, JSON.stringify(S));
  } catch (e) {
    if (entry.photo) {                     // 容量オーバー時は写真だけあきらめる
      delete entry.photo;
      save();
      alert('容量がいっぱいで、しゃしんは保存できませんでした');
    }
  }
  burst();
  flipTo(S.slot);
  updateBadge();
}
$('#m-plain').addEventListener('click', () => completeQuest(null));
$('#m-photo').addEventListener('click', () => $('#fileinput').click());
$('#modal').addEventListener('click', e => {
  if (e.target.id === 'modal') { $('#modal').hidden = true; pending = false; }
});

$('#fileinput').addEventListener('change', async e => {
  const file = e.target.files[0];
  e.target.value = '';
  if (!file || !pending) return;
  const dataUrl = await shrinkImage(file, 800, 0.72);
  completeQuest(dataUrl);
});
function shrinkImage(file, maxSize, quality) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(1, maxSize / Math.max(img.width, img.height));
      const cv = document.createElement('canvas');
      cv.width = Math.round(img.width * scale);
      cv.height = Math.round(img.height * scale);
      cv.getContext('2d').drawImage(img, 0, 0, cv.width, cv.height);
      URL.revokeObjectURL(img.src);
      resolve(cv.toDataURL('image/jpeg', quality));
    };
    img.src = URL.createObjectURL(file);
  });
}

// おうちモード
const homecheck = $('#homecheck');
homecheck.checked = S.homeMode;
syncHomeLabel();
homecheck.addEventListener('change', () => {
  S.homeMode = homecheck.checked;
  syncHomeLabel();
  if (S.homeMode && byId(S.slot).place === 'そと') {
    // そとクエストなら差し替える（skipped扱いにはしない）
    S.slot = draw(S);
    flipTo(S.slot);
  }
  save();
});
function syncHomeLabel() {
  $('#hometoggle').classList.toggle('on', S.homeMode);
  $('#homelabel').textContent = S.homeMode ? '🏠 おうちモード中' : '🏠 きょうは おうちで';
}

// ---- アルバム ----
function renderAlbum() {
  $('#totalcount').textContent = S.log.length;
  const list = $('#albumlist');
  list.innerHTML = '';
  if (S.log.length === 0) {
    list.innerHTML = '<p class="empty">まだ なにもありません。<br>むいみな ようじを すませると<br>ここに たまっていきます。</p>';
    return;
  }
  let lastDate = '';
  [...S.log].reverse().forEach(entry => {
    const d = new Date(entry.ts);
    const dstr = `${d.getMonth()+1}月${d.getDate()}日`;
    if (dstr !== lastDate) {
      lastDate = dstr;
      const lb = document.createElement('div');
      lb.className = 'datelabel';
      lb.textContent = `── ${dstr} ──`;
      list.appendChild(lb);
    }
    const q = byId(entry.id);
    const c = CATS[q.cat];
    const div = document.createElement('div');
    div.className = 'entry';
    div.innerHTML = `<p class="etext">${c.emoji} ${q.text}</p>`;
    if (entry.photo) {
      const img = document.createElement('img');
      img.src = entry.photo;
      img.loading = 'lazy';
      div.appendChild(img);
    }
    list.appendChild(div);
  });
}

// ---- タブ ----
function showTab(name) {
  $('#view-today').hidden = name !== 'today';
  $('#view-album').hidden = name !== 'album';
  $('#tab-today').classList.toggle('active', name === 'today');
  $('#tab-album').classList.toggle('active', name === 'album');
  if (name === 'album') renderAlbum();
}
$('#tab-today').addEventListener('click', () => showTab('today'));
$('#tab-album').addEventListener('click', () => showTab('album'));
function updateBadge() {
  $('#tab-album').innerHTML = `<span class="ico">📖</span>おもいでアルバム（${S.log.length}）`;
}

// ---- 起動 ----
save();
renderCard();
updateBadge();
</script>
